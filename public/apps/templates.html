<!-- ===== WINDOW TEMPLATES ===== -->

<!-- My Computer -->
<template id="tpl-mycomputer">
  <div class="win95-window" style="width:560px;height:420px;">
    <div class="win-titlebar">
      <span class="win-title">My Computer</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-min" onclick="minimizeWindow(this)">─</button>
        <button class="win-btn-max" onclick="maximizeWindow(this)">□</button>
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body" style="display:flex;flex-direction:column;position:relative;">
      <div class="win-menubar">
        <span class="win-menu-item" onclick="pcHandleAction('backup', event)">Backup to PC</span>
        <span class="win-menu-item" onclick="pcHandleAction('restore', event)">Restore from PC</span>
        <span class="win-menu-item" onclick="pcHandleAction('view-icons', event)">View</span>
        <span class="win-menu-item" onclick="pcHandleAction('help', event)">Help</span>
      </div>
      <div class="pc-explorer-toolbar">
        <div class="pc-explorer-toolbar-row">
          <button type="button" class="pc-toolbar-explorer-btn pc-tb-back" title="Back" disabled><span class="pc-tb-icon"></span></button>
          <button type="button" class="pc-toolbar-explorer-btn pc-tb-forward" title="Forward" disabled><span class="pc-tb-icon"></span></button>
          <span class="pc-explorer-sep" aria-hidden="true"></span>
          <button type="button" class="pc-toolbar-explorer-btn pc-tb-up" title="Up"><span class="pc-tb-icon"></span></button>
          <span class="pc-explorer-sep" aria-hidden="true"></span>
          <button type="button" class="pc-toolbar-explorer-btn pc-tb-view" title="Views"><span class="pc-tb-icon"></span></button>
          <div class="pc-address-bar">
            <span class="pc-address-label">Address</span>
            <img class="pc-address-icon v98-icon-img" src="vendor/98/images/icons/my-computer-16x16.png" width="16" height="16" alt="">
            <span class="pc-address-path">My Computer</span>
          </div>
        </div>
      </div>
      <div class="pc-progress hidden">
        <div class="pc-progress-label"></div>
        <div class="pc-progress-track"><div class="pc-progress-fill"></div></div>
      </div>
      <div class="win-content mycomputer-content pc-view-icons"></div>
      <input type="file" class="pc-restore-input" accept=".winxp,.win95,application/json" style="display:none;">
    </div>
    <div class="win-statusbar">0 object(s)</div>
  </div>
</template>

<!-- Control Panel -->
<template id="tpl-controlpanel">
  <div class="win95-window" style="width:580px;height:420px;">
    <div class="win-titlebar">
      <span class="win-title">🕹️ Control Panel</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-min" onclick="minimizeWindow(this)">─</button>
        <button class="win-btn-max" onclick="maximizeWindow(this)">□</button>
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body">
        <div class="win-menubar">
          <span class="win-menu-item" onclick="cpTab('system')">System</span>
          <span class="win-menu-item" onclick="cpTab('reset')">Reset</span>
          <span class="win-menu-item" onclick="cpTab('pomodoro')">Pomodoro</span>
          <span class="win-menu-item" onclick="cpTab('display')">Display</span>
          <span class="win-menu-item" onclick="cpTab('mail')">Mail</span>
          <span class="win-menu-item" onclick="cpTab('security')">Security</span>
        </div>
      <div class="win-content cp-content" id="cp-system-panel">
        <div class="cp-section">
          <div class="cp-section-title">System Information</div>
          <div class="cp-row"><span class="cp-label">Browser:</span><span id="cp-browser">--</span></div>
          <div class="cp-row"><span class="cp-label">localStorage Used:</span><span id="cp-storage">--</span></div>
          <div class="cp-row"><span class="cp-label">User Agent:</span><span id="cp-useragent" style="font-size:9px;max-width:300px;overflow:hidden;text-overflow:ellipsis;"></span></div>
          <button class="win95-button" onclick="cpClearCache()" style="margin-top:8px;">Clear Cache</button>
        </div>
      </div>
      <div class="win-content cp-content" id="cp-reset-panel" style="display:none;">
        <div class="cp-section">
          <div class="cp-section-title">Reset Options</div>
          <button class="win95-button" onclick="cpResetAll()" style="margin:4px 0;color:#ff0000;">Reset All Data</button>
          <button class="win95-button" onclick="cpResetApp('journal')" style="margin:4px 0;">Reset Notepad</button>
          <button class="win95-button" onclick="cpResetApp('mail')" style="margin:4px 0;">Reset Outlook Express</button>
          <button class="win95-button" onclick="cpResetApp('bible')" style="margin:4px 0;">Reset Bible</button>
          <button class="win95-button" onclick="cpResetApp('pomodoro')" style="margin:4px 0;">Reset Pomodoro</button>
          <button class="win95-button" onclick="cpResetApp('clippy')" style="margin:4px 0;">Reset Office Assistant</button>
        </div>
      </div>
      <div class="win-content cp-content" id="cp-pomodoro-panel" style="display:none;">
        <div class="cp-section">
          <div class="cp-section-title">Pomodoro Defaults</div>
          <div class="cp-row"><span class="cp-label">Work Duration (min):</span><input class="win95-input" id="cp-pomodoro-work" type="number" min="1" max="60" style="width:60px;"></div>
          <div class="cp-row"><span class="cp-label">Break Duration (min):</span><input class="win95-input" id="cp-pomodoro-break" type="number" min="1" max="30" style="width:60px;"></div>
          <button class="win95-button" onclick="cpSavePomodoro()" style="margin-top:8px;">Save</button>
        </div>
      </div>
      <div class="win-content cp-content" id="cp-display-panel" style="display:none;">
        <div class="cp-section">
          <div class="cp-section-title">Display Settings</div>
          <div class="cp-row"><span class="cp-label">Clock Format:</span>
            <select class="win95-input" id="cp-clock-format" style="width:120px;">
              <option value="12">12-hour</option>
              <option value="24">24-hour</option>
            </select>
          </div>
          <div class="cp-row"><span class="cp-label">Show Taskbar Clock:</span><input type="checkbox" id="cp-show-clock" checked></div>
          <div class="cp-row"><span class="cp-label">Desktop Theme:</span>
            <select class="win95-input" id="cp-desktop-theme" style="width:120px;">
              <option value="teal">Classic Teal</option>
              <option value="slate">Classic Slate</option>
              <option value="plum">Plum</option>
              <option value="rose">Rose</option>
              <option value="charcoal">Charcoal</option>
            </select>
          </div>
          <button class="win95-button" onclick="cpSaveDisplay()" style="margin-top:8px;">Save</button>
        </div>
      </div>
      <div class="win-content cp-content" id="cp-mail-panel" style="display:none;">
        <div class="cp-section">
          <div class="cp-section-title">Mail Defaults</div>
          <div class="cp-row"><span class="cp-label">Default Sender:</span><input class="win95-input" id="cp-mail-sender" style="width:200px;"></div>
          <div class="cp-row"><span class="cp-label">Signature:</span><textarea class="win95-input" id="cp-mail-sig" style="width:200px;height:60px;"></textarea></div>
          <button class="win95-button" onclick="cpSaveMail()" style="margin-top:8px;">Save</button>
        </div>
      </div>
      <div class="win-content cp-content" id="cp-security-panel" style="display:none;">
        <div class="cp-section">
          <div class="cp-section-title">Lock Screen PIN Security</div>
          <div class="cp-row">
            <span class="cp-label" style="width:140px;">Enable PIN Lock:</span>
            <input type="checkbox" id="cp-security-enable-pin" onchange="cpTogglePin(this)">
          </div>
          <div id="cp-security-pin-inputs" style="display:none;flex-direction:column;gap:8px;margin-top:8px;">
            <div class="cp-row">
              <span class="cp-label" style="width:140px;">PIN Code (4 digits):</span>
              <input class="win95-input" id="cp-security-pin" type="password" maxlength="4" style="width:80px;text-align:center;" placeholder="----">
            </div>
            <div class="cp-row">
              <span class="cp-label" style="width:140px;">Confirm PIN:</span>
              <input class="win95-input" id="cp-security-pin-confirm" type="password" maxlength="4" style="width:80px;text-align:center;" placeholder="----">
            </div>
          </div>
          <button class="win95-button" onclick="cpSaveSecurity()" style="margin-top:12px;">Save Security Settings</button>
        </div>
      </div>
    </div>
    <div class="win-statusbar" id="cp-status">Ready</div>
  </div>
</template>

<!-- Bible App -->
<template id="tpl-bible">
  <div class="win95-window" style="width:620px;height:520px;">
    <div class="win-titlebar">
      <span class="win-title">📖 Bible</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-min" onclick="minimizeWindow(this)">─</button>
        <button class="win-btn-max" onclick="maximizeWindow(this)">□</button>
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body">
      <div class="win-menubar">
        <span class="win-menu-item" onclick="biblePrevChapter()">◀ Prev</span>
        <span class="win-menu-item" onclick="bibleNextChapter()">Next ▶</span>
        <span class="win-menu-item" onclick="bibleGoToBook()">Go To Book</span>
        <span class="win-menu-item" onclick="bibleSearch()">Search</span>
        <span class="win-menu-item" onclick="bibleToggleBookmarks()">★ Bookmarks</span>
      </div>
      <div class="bible-toolbar">
        <select class="win95-select bible-book-select" id="bible-book" onchange="bibleChangeBook()"></select>
        <button class="bible-nav-btn" onclick="biblePrevChapter()">◀</button>
        <span class="bible-chapter-label" id="bible-chapter-label">Chapter 1</span>
        <button class="bible-nav-btn" onclick="bibleNextChapter()">▶</button>
        <span style="flex:1;"></span>
        <select class="win95-select bible-translation-select" id="bible-translation" onchange="bibleChangeTranslation()">
          <option value="NIV">NIV</option>
          <option value="NKJV">NKJV</option>
          <option value="KJV">KJV</option>
          <option value="ESV">ESV</option>
          <option value="NASB">NASB</option>
        </select>
        <input class="win95-input bible-search-input" id="bible-search-input" placeholder="Search..." onkeydown="bibleSearchKey(event)">
        <button class="win95-button" onclick="bibleSearch()" style="height:22px;padding:0 6px;font-size:10px;">Find</button>
      </div>
      <div class="win-content bible-layout">
        <div class="bible-sidebar" id="bible-sidebar">
          <div class="bible-sidebar-section">
            <div class="bible-sidebar-title">Old Testament</div>
            <div id="bible-ot-list"></div>
          </div>
          <div class="bible-sidebar-section">
            <div class="bible-sidebar-title">New Testament</div>
            <div id="bible-nt-list"></div>
          </div>
        </div>
        <div class="bible-main">
          <div class="bible-passage-header" id="bible-passage-header">Select a book and chapter</div>
          <div class="bible-passage" id="bible-passage">
            <div class="bible-placeholder">📖 Choose a book from the side panel, or use the dropdown above to navigate to a passage.</div>
          </div>
        </div>
      </div>
    </div>
    <div class="win-statusbar" id="bible-status">Ready</div>
  </div>
</template>

<template id="tpl-datetime-dialog">
  <div class="datetime-overlay" onclick="closeDateTimeDialog()">
    <div class="datetime-dialog" onclick="event.stopPropagation()">
      <div class="datetime-dialog-titlebar">
        <span>Date/Time Properties</span>
        <button class="win-btn-close" onclick="closeDateTimeDialog()" style="margin-left:2px;">✕</button>
      </div>
      <div class="datetime-dialog-body">
        <div class="datetime-panel">
          <div class="datetime-calendar" id="datetime-calendar"></div>
        </div>
        <div class="datetime-panel">
          <div class="datetime-clock-display">
            <div class="datetime-clock-time" id="datetime-clock-time">12:00:00 PM</div>
            <div class="datetime-clock-date" id="datetime-clock-date">January 1, 2026</div>
          </div>
        </div>
      </div>
      <div class="datetime-dialog-buttons">
        <button class="win95-button" onclick="closeDateTimeDialog()">OK</button>
        <button class="win95-button" onclick="closeDateTimeDialog()">Cancel</button>
      </div>
    </div>
  </div>
</template>

<!-- Lock Screen -->
<template id="tpl-lockscreen">
  <div class="lockscreen-overlay" id="lockscreen-overlay">
    <div class="lockscreen-box">
      <div class="lockscreen-title">Windows XP</div>
      <div class="lockscreen-datetime" id="lockscreen-datetime"></div>
      <div class="lockscreen-msg">This computer is in use and has been locked.</div>
      <div class="lockscreen-submsg">Click anywhere to unlock</div>
    </div>
  </div>
</template>

<!-- About Windows Dialog -->
<template id="tpl-about-windows">
  <div class="about-overlay" onclick="closeAboutWindows()">
    <div class="about-dialog" onclick="event.stopPropagation()">
      <div class="about-titlebar">
        <span>About Windows</span>
        <button class="win-btn-close" onclick="closeAboutWindows()">✕</button>
      </div>
      <div class="about-body">
        <div class="about-logo">🪟</div>
        <div class="about-version">Microsoft<span class="about-reg">&reg;</span> Windows XP</div>
        <div class="about-ver">Version 5.1.2600</div>
        <div class="about-copyright">Copyright &copy; 1981-2001 Microsoft Corp.</div>
        <hr class="about-divider">
        <div class="about-info">
          This product is licensed to:<br>
          <b>Anesu Mukusha</b><br><br>
          Physical Memory Available to Windows: <span id="about-memory">64,000 KB</span><br>
          System Resources: <span id="about-resources">85% free</span>
        </div>
      </div>
      <div class="about-buttons">
        <button class="win95-button" onclick="closeAboutWindows()">OK</button>
      </div>
    </div>
  </div>
</template>

<!-- Run Dialog -->
<template id="tpl-run">
  <div class="win95-window" style="width:360px;height:165px;">
    <div class="win-titlebar">
      <span class="win-title">Run</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body run-body" style="padding:10px;display:flex;flex-direction:column;gap:10px;">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <span style="font-size:32px;">🏃</span>
        <div style="font-size:11px;line-height:1.4;">Type the name of a program, folder, or document, and Windows will open it for you.</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;width:40px;">Open:</span>
        <input class="win95-input" id="run-input" style="flex:1;height:20px;padding:2px 4px;font-size:11px;" onkeydown="runCheckKey(event, this)">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:4px;">
        <button class="win95-button" onclick="runExecute(this)" style="width:75px;font-weight:bold;height:23px;">OK</button>
        <button class="win95-button" onclick="closeWindow(this)" style="width:75px;height:23px;">Cancel</button>
        <button class="win95-button" disabled style="width:75px;height:23px;">Browse...</button>
      </div>
    </div>
  </div>
</template>

<!-- Clippy Prompts App -->
<template id="tpl-clippy">
  <div class="win95-window" style="width:800px;height:500px;">
    <div class="win-titlebar">
      <span class="win-title">Microsoft Office Assistant</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-min" onclick="minimizeWindow(this)">─</button>
        <button class="win-btn-max" onclick="maximizeWindow(this)">□</button>
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body">
      <div class="win-menubar">
        <span class="win-menu-item" onclick="clippyNew()">New</span>
        <span class="win-menu-item" onclick="clippyEdit()">Edit</span>
        <span class="win-menu-item" onclick="clippyDelete()">Delete</span>
        <span class="win-menu-item" onclick="clippyCopy()">Copy to Clipboard</span>
      </div>
      <div class="mail-toolbar">
        <button class="win95-button" onclick="clippyNew()" style="height:22px;padding:0 8px;font-size:10px;">📎 New</button>
        <button class="win95-button" onclick="clippyEdit()" style="height:22px;padding:0 8px;font-size:10px;">✎ Edit</button>
        <button class="win95-button" onclick="clippyDelete()" style="height:22px;padding:0 8px;font-size:10px;">✕ Delete</button>
        <span style="flex:1;"></span>
        <button class="win95-button" onclick="clippyCopy()" style="height:22px;padding:0 8px;font-size:10px;">📋 Copy</button>
        <input class="win95-input mail-search" id="clippy-search" placeholder="Search..." oninput="clippySearch()" style="width:150px;">
      </div>
      <div class="win-content mail-layout">
        <div class="mail-sidebar">
          <div class="mail-sidebar-inner" id="clippy-sidebar-inner"></div>
        </div>
        <div class="mail-list-pane" id="clippy-list-pane"></div>
        <div class="clippy-preview-pane" id="clippy-preview-pane">
          <!-- Populated dynamically -->
        </div>
      </div>
    </div>
    <div class="win-statusbar" id="clippy-status">Ready</div>
  </div>
</template>

<!-- Clippy Variables Fill Dialog Template -->
<template id="tpl-clippy-variables">
  <div class="mail-var-overlay">
    <div class="mail-var-dialog">
      <div class="mail-var-dialog-title">Fill Prompt Variables</div>
      <div class="mail-var-dialog-body" id="clippy-var-list"></div>
      <div class="mail-var-dialog-buttons">
        <button class="win95-button" onclick="clippyVarCancel()">Cancel</button>
        <button class="win95-button" onclick="clippyVarCopy()" style="font-weight:bold;">📋 Copy to Clipboard</button>
      </div>
    </div>
  </div>
</template>

<!-- Help App -->
<template id="tpl-help">
  <div class="win95-window" style="width:420px;height:350px;">
    <div class="win-titlebar">
      <span class="win-title">Help and Support</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-min" onclick="minimizeWindow(this)">─</button>
        <button class="win-btn-max" onclick="maximizeWindow(this)">□</button>
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body" style="padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;">
      <div style="font-size:12px;font-weight:bold;margin-bottom:4px;color:#000;">Welcome to Windows XP Help!</div>
      <div class="win-content" style="background:#fff;border:2px solid #808080;padding:10px;overflow-y:auto;flex:1;font-size:11px;line-height:1.5;color:#000;">
        <p style="margin-top:0;">Here are some helpful tips to guide you through the system:</p>
        <ul style="padding-left:18px;margin-top:6px;margin-bottom:0;">
          <li><b>Start Menu:</b> Use the Start button in the taskbar to launch applications, open recent documents, adjust settings, lock the computer, or shut down.</li>
          <li><b>Lock Screen & PIN:</b> Lock your workstation via Start Menu &rarr; <b>Lock Computer</b>, or type <b>lock</b> in the Run dialog (Win+R). Set a 4-digit PIN in Control Panel &rarr; <b>Security</b>.</li>
          <li><b>Run Command:</b> Use the shortcut <b>Win+R</b> (or click Start -> Run) to run applications by name (e.g. <i>control</i>, <i>bible</i>, <i>mail</i>, <i>journal</i>, <i>clippy</i>, <i>lock</i>, <i>help</i>).</li>
          <li><b>Office Assistant:</b> Launch "Office Assistant" from the desktop or Start menu to store, search, and copy prompt templates with dynamic variables.</li>
          <li id="help-backup-section"><b>Backup Filesystem:</b> Open "My Computer" and double-click "Backup to PC" to download a local backup file (.winxp), or "Restore from PC" to load your data back. Legacy .win95 backups are also supported. You can drag a backup file onto the My Computer window. Use selective restore to import only specific data areas. Enable auto-backup on exit in (C:) Properties.</li>
        </ul>
      </div>
      <div style="display:flex;justify-content:flex-end;margin-top:4px;">
        <button class="win95-button" onclick="closeWindow(this)" style="width:75px;height:23px;font-weight:bold;">Close</button>
      </div>
    </div>
  </div>
</template>

<!-- QRx Transmitter Template -->
<template id="tpl-qrtx">
  <div class="win95-window" style="width:720px;height:450px;">
    <div class="win-titlebar">
      <span class="win-title">📡 QRx Transmitter</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-min" onclick="minimizeWindow(this)">─</button>
        <button class="win-btn-max" onclick="maximizeWindow(this)">□</button>
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body qrtx-body" style="display:flex; flex-direction:column; height:100%;">
      <div class="win-menubar">
        <span class="win-menu-item qrtx-menu-start" onclick="qrtxStart(this)">Start</span>
        <span class="win-menu-item qrtx-menu-stop" onclick="qrtxStop(this)" style="display:none; color:#800000; font-weight:bold;">Stop</span>
        <span class="win-menu-item qrtx-menu-reset" onclick="qrtxReset(this)">Reset</span>
      </div>
      
      <div class="win-content qrtx-layout" style="display:flex; flex:1; background:#c0c0c0; padding:6px; gap:8px; overflow:hidden;">
        
        <!-- Left Column: Tabs, Input, Settings -->
        <div class="qrtx-left-col" style="display:flex; flex-direction:column; flex:1; gap:6px; min-width:0;">
          
          <!-- Tabs Bar -->
          <div class="qrtx-tabs" style="display:flex; border-bottom:2px solid #808080;">
            <button class="qrtx-tab active" data-tab="text">Paste Text</button>
            <button class="qrtx-tab" data-tab="file">Upload File</button>
          </div>
          
          <!-- Tab Contents -->
          <div class="qrtx-tab-contents" style="display:flex; flex:1; min-height:120px;">
            <!-- Text Tab -->
            <div class="qrtx-tab-panel qrtx-panel-text" style="display:flex; flex:1; flex-direction:column;">
              <textarea class="win95-input qrtx-text-input" style="flex:1; width:100%; resize:none; font-family:monospace; font-size:11px;" placeholder="Paste text, scripts, keys, or code blocks here...&#10;Receiver uses a DotAll parser so newlines are fully preserved."></textarea>
            </div>
            <!-- File Tab -->
            <div class="qrtx-tab-panel qrtx-panel-file" style="display:none; flex:1; flex-direction:column;">
              <div class="win95-inset qrtx-drop-zone" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border:2px dashed #808080; background:#fff; cursor:pointer; padding:10px; text-align:center;">
                <span style="font-size:24px; margin-bottom:4px;">📤</span>
                <div style="font-size:11px; font-weight:bold; color:#000;">Drag & drop file here</div>
                <div style="font-size:9px; color:#808080; margin-top:2px;">or click to browse</div>
                <input type="file" class="qrtx-file-input" style="display:none;">
              </div>
              <div class="qrtx-file-banner" style="display:none; align-items:center; justify-content:space-between; background:#d4d0c8; border:1px solid #808080; padding:6px; font-size:11px; margin-top:4px; width:100%;">
                <span class="qrtx-file-details" style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; color:#000; text-align:left;"></span>
                <button class="win95-button qrtx-file-remove" style="height:18px; padding:0 6px; font-size:9px;">Remove</button>
              </div>
            </div>
          </div>
          
          <!-- Base64 Encoding option -->
          <div style="display:flex; align-items:center; gap:6px; padding:4px 0;">
            <input type="checkbox" class="win95-checkbox qrtx-base64-checkbox" id="qrtx-b64-chk">
            <label for="qrtx-b64-chk" style="font-size:11px; color:#000; cursor:pointer; font-weight:bold;">Base64 Payload Encoding</label>
          </div>
          
          <!-- Warning alert box -->
          <div class="win95-inset qrtx-alert-box" style="display:none; background:#ffffe1; border:1px solid #808080; padding:6px; font-size:10px; color:#800000; align-items:flex-start; gap:6px;">
            <span>⚠️</span>
            <div style="text-align:left;"><b>Character Conflict:</b> Input contains <code>|</code> or <code>]</code>, which could break parsing. Enable Base64 encoding.</div>
          </div>
          
          <!-- Slider: Loop Frame Interval -->
          <div style="display:flex; flex-direction:column; gap:2px; background:#d4d0c8; border:1px solid #808080; padding:6px; box-shadow:inset 1px 1px 0 #fff;">
            <div style="display:flex; justify-content:space-between; font-size:11px; color:#000; font-weight:bold;">
              <span>Loop Frame Interval</span>
              <span class="qrtx-speed-label" style="color:#000080;">300ms</span>
            </div>
            <input type="range" class="win95-trackbar qrtx-speed-slider" min="150" max="1000" step="50" value="300" style="width:100%;">
          </div>
          
          <!-- Slider: QR Chunk Payload Size -->
          <div style="display:flex; flex-direction:column; gap:2px; background:#d4d0c8; border:1px solid #808080; padding:6px; box-shadow:inset 1px 1px 0 #fff;">
            <div style="display:flex; justify-content:space-between; font-size:11px; color:#000; font-weight:bold;">
              <span>QR Chunk Payload Size</span>
              <span class="qrtx-chunk-label" style="color:#008000;">250 chars</span>
            </div>
            <input type="range" class="win95-trackbar qrtx-chunk-slider" min="200" max="300" step="10" value="250" style="width:100%;">
          </div>
          
        </div>
        
        <!-- Right Column: QR viewport & Stats Fieldsets -->
        <div class="qrtx-right-col" style="display:flex; flex-direction:column; width:250px; gap:6px; flex-shrink:0;">
          
          <!-- QR Viewport -->
          <div class="win95-inset qrtx-viewport" style="display:flex; align-items:center; justify-content:center; background:#fff; height:190px; border:2px solid #808080; position:relative; overflow:hidden;">
            <div class="qrtx-qrcode" style="display:flex; align-items:center; justify-content:center;"></div>
            <!-- Scan line overlay -->
            <div class="qrtx-scanline" style="display:none; position:absolute; left:0; top:0; width:100%; height:2px; background:rgba(0,0,128,0.5); box-shadow:0 0 4px #000080; animation:qrtx-scan 2s linear infinite;"></div>
          </div>
          
          <!-- Stats Panel -->
          <fieldset class="qrtx-groupbox" style="border:2px solid #dfdfdf; border-top-color:#dfdfdf; border-left-color:#dfdfdf; border-bottom-color:#808080; border-right-color:#808080; padding:8px; display:flex; flex-direction:column; gap:6px; flex:1; background:#c0c0c0; margin:0;">
            <legend style="font-size:11px; font-weight:bold; color:#000; padding:0 4px;">Status & Link Stats</legend>
            
            <!-- Status Badge -->
            <div style="display:flex; align-items:center; gap:6px; font-size:10px; font-weight:bold; text-transform:uppercase; color:#808080; padding-top:4px;">
              <span class="qrtx-ping-dot" style="display:inline-block; width:8px; height:8px; border-radius:50%; background:#808080;"></span>
              <span class="qrtx-status-text">Idle</span>
            </div>
            
            <div style="display:flex; gap:6px; text-align:left;">
              <div style="flex:1; border:1px solid #808080; background:#d4d0c8; padding:3px; font-size:10px; color:#000; box-shadow:inset 1px 1px 0 #fff;">
                <div style="color:#808080; font-size:9px; text-transform:uppercase;">Session ID</div>
                <div class="qrtx-stat-tx-id" style="font-weight:bold;">----</div>
              </div>
              <div style="flex:1; border:1px solid #808080; background:#d4d0c8; padding:3px; font-size:10px; color:#000; box-shadow:inset 1px 1px 0 #fff;">
                <div style="color:#808080; font-size:9px; text-transform:uppercase;">Total Frames</div>
                <div class="qrtx-stat-total-frames" style="font-weight:bold;">0</div>
              </div>
            </div>
            
            <!-- Progress Bar -->
            <div style="border:1px solid #808080; background:#d4d0c8; padding:4px; display:flex; flex-direction:column; gap:3px; text-align:left; box-shadow:inset 1px 1px 0 #fff;">
              <div style="display:flex; justify-content:space-between; font-size:10px; color:#000;">
                <span>Frame: <b class="qrtx-prog-frame">0</b> of <b class="qrtx-prog-total">0</b></span>
                <span class="qrtx-prog-percent">0%</span>
              </div>
              <!-- Retro progress bar -->
              <div class="win95-inset" style="height:14px; background:#fff; display:flex; padding:1px; overflow:hidden;">
                <div class="qrtx-prog-fill" style="width:0%; height:100%; background:#000080;"></div>
              </div>
            </div>
            
            <div style="display:flex; gap:6px; text-align:left;">
              <div style="flex:1; border:1px solid #808080; background:#d4d0c8; padding:3px; font-size:10px; color:#000; box-shadow:inset 1px 1px 0 #fff;">
                <div style="color:#808080; font-size:9px; text-transform:uppercase;">Loop Speed</div>
                <div class="qrtx-stat-speed" style="font-weight:bold;">0 Hz</div>
              </div>
              <div style="flex:1; border:1px solid #808080; background:#d4d0c8; padding:3px; font-size:10px; color:#000; box-shadow:inset 1px 1px 0 #fff;">
                <div style="color:#808080; font-size:9px; text-transform:uppercase;">Mode</div>
                <div class="qrtx-stat-mode" style="font-weight:bold;">Plain Text</div>
              </div>
            </div>
            
          </fieldset>
          
        </div>
        
      </div>
      <div class="win-statusbar qrtx-statusbar" style="font-size:11px; padding:2px 4px;">Ready</div>
    </div>
  </div>
</template>

<!-- Enter PIN Dialog for Screen Unlock -->
<template id="tpl-lock-pin-dialog">
  <div class="win95-window lock-pin-dialog" style="width:280px;height:130px;position:absolute;z-index:100005;left:50%;top:50%;transform:translate(-50%, -50%);box-shadow:2px 2px 10px rgba(0,0,0,0.5);">
    <div class="win-titlebar">
      <span class="win-title">Enter Password</span>
    </div>
    <div class="win-body" style="padding:12px;display:flex;flex-direction:column;gap:8px;background:#c0c0c0;flex:1;">
      <div style="font-size:11px;color:#000;">Type your screen lock PIN:</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:11px;width:30px;color:#000;">PIN:</span>
        <input class="win95-input" id="lock-pin-input" type="password" maxlength="4" style="flex:1;height:20px;text-align:center;font-size:14px;letter-spacing:4px;" autofocus>
      </div>
      <div style="color:#ff0000;font-size:10px;height:12px;text-align:center;" id="lock-pin-error"></div>
      <div style="display:flex;justify-content:flex-end;gap:6px;margin-top:2px;">
        <button class="win95-button" id="lock-pin-ok-btn" style="width:65px;font-weight:bold;height:22px;">OK</button>
        <button class="win95-button" id="lock-pin-cancel-btn" style="width:65px;height:22px;">Cancel</button>
      </div>
    </div>
  </div>
</template>
