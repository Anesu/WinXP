<template id="tpl-kanban">
  <div class="win95-window" style="width: 600px; height: 400px;">
    <div class="win-titlebar">
      <span class="win-title">📊 Kanban Board</span>
      <div class="win-titlebar-btns">
        <button class="win-btn-min" onclick="minimizeWindow(this)">_</button>
        <button class="win-btn-max" onclick="maximizeWindow(this)">□</button>
        <button class="win-btn-close" onclick="closeWindow(this)">✕</button>
      </div>
    </div>
    <div class="win-body">
      <div class="win-content kanban-container" id="kanban-container"></div>
    </div>
    <div class="win-statusbar">Integration: todoStore | Columns: 3</div>
    <div class="win-resize-handle"></div>
  </div>
</template>
