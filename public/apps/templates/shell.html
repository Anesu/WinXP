<template id="tpl-about-windows">
  <div class="about-overlay" onclick="closeAboutWindows()">
    <div class="about-dialog" onclick="event.stopPropagation()">
      <div class="about-titlebar">
        <span>About Windows</span>
        <button class="win-btn-close" onclick="closeAboutWindows()" title="Close" aria-label="Close"></button>
      </div>
      <div class="about-body">
        <div class="about-logo">🪟</div>
        <div class="about-version">Microsoft<span class="about-reg">&reg;</span> Windows XP</div>
        <div class="about-ver">Version 5.1.2600</div>
        <div class="about-copyright">Copyright &copy; 1981-2001 Microsoft Corp.</div>
        <hr class="about-divider">
        <div class="about-info">
          This product is licensed to:<br>
          <b id="about-user-name">User</b><br><br>
          Physical Memory Available to Windows: <span id="about-memory">64,000 KB</span><br>
          System Resources: <span id="about-resources">85% free</span>
        </div>
      </div>
      <div class="about-buttons">
        <button class="win95-button" onclick="closeAboutWindows()">OK</button>
      </div>
    </div>
  </div>
</template>

<!-- Search Companion -->

<template id="tpl-datetime-dialog">
  <div class="datetime-overlay" onclick="closeDateTimeDialog()">
    <div class="datetime-dialog" onclick="event.stopPropagation()">
      <div class="datetime-dialog-titlebar">
        <span>Date/Time Properties</span>
        <button class="win-btn-close" onclick="closeDateTimeDialog()" title="Close" aria-label="Close"></button>
      </div>
      <div class="datetime-dialog-body">
        <div class="datetime-panel">
          <div class="datetime-calendar" id="datetime-calendar"></div>
        </div>
        <div class="datetime-panel">
          <div class="datetime-clock-display">
            <div class="datetime-clock-time" id="datetime-clock-time">12:00:00 PM</div>
            <div class="datetime-clock-date" id="datetime-clock-date">January 1, 2026</div>
          </div>
        </div>
      </div>
      <div class="datetime-dialog-buttons">
        <button class="win95-button" onclick="closeDateTimeDialog()">OK</button>
        <button class="win95-button" onclick="closeDateTimeDialog()">Cancel</button>
      </div>
    </div>
  </div>
</template>

<!-- Windows XP Lock / Welcome Screen -->

<template id="tpl-lockscreen">
  <div class="xp-lockscreen lockscreen-overlay" id="lockscreen-overlay">
    <header class="xp-lockscreen-header">
      <img class="xp-lockscreen-flag" id="lockscreen-flag" alt="" draggable="false">
      <div class="xp-lockscreen-brand">
        <span class="xp-lockscreen-ms">Microsoft</span>
        <span class="xp-lockscreen-win">Windows <em>XP</em></span>
      </div>
      <div class="xp-lockscreen-datetime" id="lockscreen-datetime"></div>
    </header>

    <main class="xp-lockscreen-main">
      <p class="xp-lockscreen-message" id="lockscreen-message">To begin, click your user name</p>

      <div class="xp-lockscreen-users" id="lockscreen-users">
        <button type="button" class="xp-user-tile" id="lockscreen-user-tile">
          <span class="xp-user-tile-frame">
            <img class="xp-user-tile-icon" id="lockscreen-user-icon" alt="" draggable="false">
          </span>
          <span class="xp-user-tile-name" id="lockscreen-user-name"></span>
        </button>
      </div>

      <div class="xp-unlock-form hidden" id="lockscreen-unlock-form">
        <div class="xp-unlock-form-inner">
          <span class="xp-unlock-icon-frame">
            <img class="xp-unlock-icon" id="lockscreen-unlock-icon" alt="" draggable="false">
          </span>
          <div class="xp-unlock-fields">
            <div class="xp-unlock-username" id="lockscreen-unlock-username"></div>
            <label class="xp-unlock-label" for="lockscreen-password">Type your password:</label>
            <div class="xp-unlock-password-row">
              <input type="password" id="lockscreen-password" class="xp-unlock-password" autocomplete="off" spellcheck="false">
              <button type="button" class="xp-unlock-submit" id="lockscreen-submit" title="Log On" aria-label="Log On"></button>
            </div>
            <div class="xp-unlock-error" id="lockscreen-error" role="alert"></div>
          </div>
        </div>
      </div>
    </main>

    <footer class="xp-lockscreen-footer">
      <button type="button" class="xp-turn-off" id="lockscreen-turn-off">Turn off computer</button>
      <div class="xp-lockscreen-progress hidden" id="lockscreen-progress" aria-hidden="true">
        <div class="xp-lockscreen-progress-fill" id="lockscreen-progress-fill"></div>
      </div>
    </footer>
  </div>
</template>
